<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HakimHome - خدمات واستشارات طبية منزلية بإشراف نخبة من الأطباء المتخصصين">
  <meta name="theme-color" content="#0E3A4D">
  
  <title>HakimHome | خدمات واستشارات طبية منزلية</title>

  <style>
    :root {
      --primary-dark: #0E3A4D;
      --primary-blue: #2E7FA3;
      --primary-green: #5DAF83;
      --text-light: #F2F6F7;
      --text-muted: #B8C5C9;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 16px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, 'Arial', sans-serif;
      background: linear-gradient(135deg, rgba(14,58,77,0.85), rgba(46,127,163,0.75)),
                  url('background.png') center/cover no-repeat fixed;
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius);
      padding: 35px 25px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.15);
      animation: containerFadeIn 0.8s ease-out;
    }

    @keyframes containerFadeIn {
      from { opacity: 0; transform: translateY(25px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--primary-green);
      box-shadow: 0 6px 20px rgba(93, 175, 131, 0.4);
      margin: 10px auto 20px;
      display: block;
      animation: logoPop 1.2s ease-out;
      transition: var(--transition);
      background: white;
      padding: 10px;
    }

    .logo:hover {
      transform: scale(1.05) rotate(2deg);
      box-shadow: 0 10px 30px rgba(93, 175, 131, 0.6);
    }

    @keyframes logoPop {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 10px 0 8px;
      animation: slideDown 0.7s ease-out;
    }

    .subtitle {
      color: var(--primary-green);
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 28px;
      opacity: 0.95;
      animation: fadeIn 1s ease-out 0.2s both;
    }

    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      margin: 10px 0;
      border-radius: var(--radius);
      text-decoration: none;
      color: white;
      font-weight: 600;
      font-size: 1.05rem;
      transition: var(--transition);
      opacity: 0;
      animation: fadeUp 0.6s ease-out forwards;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
      border: none;
      cursor: pointer;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
    }

    .btn.whatsapp {
      background: linear-gradient(135deg, #25D366, var(--primary-green));
      animation-delay: 0.3s;
    }

    .btn.facebook-main {
      background: linear-gradient(135deg, #1877F2, var(--primary-blue));
      animation-delay: 0.5s;
    }

    .btn.facebook-edu {
      background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark));
      animation-delay: 0.7s;
    }

    @keyframes fadeUp {
      from { transform: translateY(25px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .doctors {
      margin: 32px 0 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 2;
      color: var(--text-light);
      border-right: 4px solid var(--primary-green);
      animation: fadeIn 1s ease-out 0.9s both;
    }

    .doctors strong {
      color: var(--primary-green);
      font-weight: 700;
    }

    .footer {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 0.85rem;
      color: var(--text-muted);
      animation: fadeIn 1s ease-out 1.2s both;
    }

    @media (max-width: 480px) {
      .container { padding: 28px 20px; }
      h1 { font-size: 1.6rem; }
      .logo { width: 115px; height: 115px; }
    }
  </style>
</head>

<body>

  <main class="container" role="main">
    
    <!-- اللوغو -->
    <img 
      src="logo.png" 
      alt="شعار HakimHome" 
      class="logo"
      width="130" 
      height="130"
    >

    <h1>HakimHome</h1>
    <p class="subtitle">خدمات واستشارات طبية منزلية موثوقة</p>

    <a 
      href="https://wa.me/message/F7CXNNBVMWLWJ1" 
      class="btn whatsapp"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span>💬</span>
      تواصل عبر واتساب
    </a>

    <a 
      href="https://www.facebook.com/drsociiety/" 
      class="btn facebook-main"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span>📘</span>
      الصفحة الرسمية
    </a>

    <a 
      href="https://www.facebook.com/profile.php?id=61573278433578" 
      class="btn facebook-edu"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span>📚</span>
      صفحة التوعية
    </a>

    <section class="doctors">
      <strong>✨ بإشراف نخبة من الأطباء:</strong>
      <span>👨‍⚕️ د. محمد خراطة</span>
      <span>👨‍⚕️ د. عبد الرحمن المؤذن</span>
    </section>

    <footer class="footer">
      <p>© 2026 <strong>HakimHome</strong> — جميع الحقوق محفوظة</p>
    </footer>

  </main>

</body>
</html>
